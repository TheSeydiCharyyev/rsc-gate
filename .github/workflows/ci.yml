name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
      - name: Smoke-run CLI on fixtures
        run: |
          node dist/cli.js fixtures/demo --no-color
          node dist/cli.js fixtures/edge --no-color
          node dist/cli.js fixtures/frozen-build --no-color
          node dist/cli.js fixtures/commonjs --no-color
          node dist/cli.js fixtures/baseurl-bare --no-color
          node dist/cli.js fixtures/jsconfig --no-color
          node dist/cli.js fixtures/nested-props --no-color

      - name: Bundle cost is reported from the committed build snapshot
        shell: bash
        run: |
          node dist/cli.js fixtures/frozen-build --no-color | grep -q "BUNDLE COST" \
            || { echo "no BUNDLE COST section — the frozen .next snapshot is not being read"; exit 1; }
      - name: Strict gate catches the planted hazard
        shell: bash
        run: |
          if node dist/cli.js fixtures/demo --strict > /dev/null 2>&1; then
            echo "expected exit 2 on hazardous fixture" && exit 1
          fi

      - name: Strict gate catches a server-only leak
        shell: bash
        run: |
          if node dist/cli.js fixtures/orphan-leak --strict > /dev/null 2>&1; then
            echo "expected exit 2 on a server-only leak" && exit 1
          fi

      - name: Strict gate stays quiet on a clean project
        shell: bash
        run: node dist/cli.js fixtures/edge --strict > /dev/null
