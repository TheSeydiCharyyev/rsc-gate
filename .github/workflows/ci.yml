name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
      - name: Smoke-run CLI on fixtures
        run: |
          node dist/cli.js fixtures/demo --no-color
          node dist/cli.js fixtures/edge --no-color
          node dist/cli.js fixtures/frozen-build --no-color
          node dist/cli.js fixtures/commonjs --no-color
          node dist/cli.js fixtures/baseurl-bare --no-color
          node dist/cli.js fixtures/jsconfig --no-color
          node dist/cli.js fixtures/nested-props --no-color
          node dist/cli.js fixtures/ns-tags --no-color
          node dist/cli.js fixtures/monorepo --no-color

      - name: Bundle cost is reported from the committed build snapshot
        shell: bash
        run: |
          node dist/cli.js fixtures/frozen-build --no-color | grep -q "BUNDLE COST" \
            || { echo "no BUNDLE COST section — the frozen .next snapshot is not being read"; exit 1; }
      # The --strict exit code of EVERY fixture, both directions. 0.2.0 shipped a
      # false positive that failed a healthy project's CI — the release checks
      # covered packaging and the API, but never asserted that a clean project
      # still exits 0. This is that missing assertion, and it is not optional:
      # for a tool that sells itself as a CI gate, firing on healthy code is the
      # worst bug it can have.
      - name: Strict gate — exit code of every fixture
        shell: bash
        run: |
          set -u
          fail=0
          expect() {
            # `shell: bash` runs with -e, so a bare failing command would abort the
            # script — and a --strict run is *meant* to exit 2. Capture the code
            # with `|| got=$?`, which -e leaves alone.
            got=0
            node dist/cli.js "fixtures/$1" --strict > /dev/null 2>&1 || got=$?
            if [ "$got" != "$2" ]; then
              echo "FAIL  fixtures/$1: expected exit $2, got $got"
              fail=1
            fi
          }

          # Must FAIL the build — a real hazard or a real leak.
          for f in demo serialize orphan-leak client-entry dynamic-import \
                   exact-alias extends-alias ns-reexport ns-tags commonjs \
                   baseurl-bare jsconfig nested-props monorepo; do
            expect "$f" 2
          done

          # Must PASS — healthy projects. A gate that fires here is useless.
          #   server-only-alias: "server-only" aliased to a local shim — the 0.2.0 FP
          #   no-baseurl:        bare specifier, no baseUrl — nothing resolves, nothing leaks
          #   wildcard-leak:     barrel re-export that must not fake a leak
          #   action-ref:        a Server Action passed by reference is legal
          for f in edge action-ref wildcard-leak frozen-build broken-tsconfig \
                   no-baseurl server-only-alias next-demo; do
            expect "$f" 0
          done

          exit $fail
