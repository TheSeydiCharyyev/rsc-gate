name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
      - name: Smoke-run CLI on fixtures
        run: |
          node dist/cli.js fixtures/demo --no-color
          node dist/cli.js fixtures/edge --no-color
      - name: Strict gate catches the planted hazard
        shell: bash
        run: |
          if node dist/cli.js fixtures/demo --strict > /dev/null 2>&1; then
            echo "expected exit 2 on hazardous fixture" && exit 1
          fi
